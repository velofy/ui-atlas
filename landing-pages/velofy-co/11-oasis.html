  .scrim {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse 52% 42% at 50% 54%, rgba(10, 18, 28, 0.16), transparent 70%),
      linear-gradient(180deg, rgba(10, 18, 28, 0.12) 0%, transparent 26%, transparent 72%, rgba(10, 18, 28, 0.22) 100%);
  }
  .hero {
    position: fixed;
    inset: 0;
    z-index: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    text-align: center;
  }
  .panel {
    display: grid;
    justify-items: center;
    gap: clamp(0.9rem, 2.2vh, 1.5rem);
    width: fit-content;
    max-width: calc(100vw - 48px);
    padding: clamp(2rem, 5vw, 3.4rem) clamp(2rem, 6vw, 4.4rem);
    border-radius: clamp(20px, 3vw, 32px);
    background: var(--panel);
    border: 1px solid var(--edge);
    box-shadow: 0 24px 80px rgba(8, 14, 22, 0.35);
    -webkit-backdrop-filter: blur(16px) saturate(1.25);
    backdrop-filter: blur(16px) saturate(1.25);
    opacity: 0;
    animation: rise 1.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards;
  }
  h1 {
    font-family: var(--display);
    font-weight: 400;
    font-size: clamp(3.2rem, 13vw, 9rem);
    line-height: 1;
    letter-spacing: -0.02em;
    text-transform: lowercase;
    color: var(--ink);
    text-shadow: 0 2px 40px rgba(10, 18, 28, 0.4);
  }
  h1 em {
    font-style: italic;
    letter-spacing: -0.04em;
    padding-right: 0.02em;
  }
  .tagline {

<!DOCTYPE html>
<html lang="en" data-palette="copper">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dehaux: Signing out</title>
<link rel="stylesheet" href="assets/dehaux.css">
</head>
<body>
<main class="ceremony" data-redirect="login.html?signed_out=1">

  <div class="brand">
    <div class="tile">D</div>
    <div style="text-align:center">
      <div class="name">Dehaux</div>
      <div class="sub">Operations Hub</div>
    </div>
  </div>

  <div class="spinner" role="status" aria-label="Signing out"></div>

  <span class="rule-label">Signing out</span>

  <h1 class="display-xl">See you <em>soon</em>.</h1>
  <p class="sub">Closing your session and putting things back in order.</p>

  <span class="pill quiet"><i></i>Session ending</span>

</main>

<div class="palette-dock" role="group" aria-label="Palette">
  <span class="lab">Palette</span>
  <button class="sw-copper" data-set="copper" aria-label="Copper palette"></button>
  <button class="sw-brass" data-set="brass" aria-label="Brass palette"></button>
  <button class="sw-verdigris" data-set="verdigris" aria-label="Verdigris palette"></button>
</div>

<script src="assets/dehaux.js"></script>
</body>
</html>
